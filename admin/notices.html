<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board Admin | MCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F6F1E8;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #E5E7EB;
            border-radius: 20px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #D1D5DB;
        }

        /* Toggle Checkbox Styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10B981;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #10B981;
        }
    </style>
</head>

<body class="bg-[#F6F1E8] p-6 text-[#0F3D3E] relative min-h-screen z-0">
    <!-- Decorative Background Shapes -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#C6A75E]/10 rounded-full blur-[100px] pointer-events-none -z-10">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-[#0F3D3E]/5 rounded-full blur-[100px] pointer-events-none -z-10">
    </div>

    <!-- Auth Check -->
    <script>
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <header
            class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6 bg-white/60 p-6 md:p-8 rounded-3xl border border-white backdrop-blur-md shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative overflow-hidden transition-all hover:bg-white/80">
            <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-[#0F3D3E] to-[#C6A75E]"></div>
            <div class="pl-2">
                <h1 class="text-3xl md:text-3xl font-extrabold tracking-tight text-[#0F3D3E] mb-2">Notice Board Manager
                    📢</h1>
                <p class="text-[#0F3D3E]/70 font-medium text-sm">Post and manage announcements displayed on the
                    homepage.</p>
            </div>
            <div class="flex flex-wrap gap-2 w-full xl:w-auto relative z-10">
                <a href="dashboard.html"
                    class="flex-1 xl:flex-none justify-center px-4 py-2.5 text-xs font-bold text-[#0F3D3E] bg-white border border-[#0F3D3E]/20 rounded-xl hover:bg-[#0F3D3E]/5 hover:border-[#0F3D3E]/50 transition-all shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h7" />
                    </svg>
                    Gallery
                </a>
                <a href="donations.html"
                    class="flex-1 xl:flex-none justify-center px-4 py-2.5 text-xs font-bold text-[#0F3D3E] bg-white border border-[#C6A75E]/30 rounded-xl hover:bg-[#C6A75E]/10 hover:border-[#C6A75E] transition-all shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-[#C6A75E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Donations
                </a>
                <a href="students.html"
                    class="flex-1 xl:flex-none justify-center px-4 py-2.5 text-xs font-bold text-[#0F3D3E] bg-white border border-[#0F3D3E]/20 rounded-xl hover:bg-[#0F3D3E]/5 transition-all shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Add Student
                </a>
                <button onclick="logout()"
                    class="flex-1 xl:flex-none justify-center px-4 py-2.5 bg-red-50 text-red-600 rounded-xl hover:bg-red-500 hover:text-white transition-all font-bold text-xs">
                    Sign Out
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- LEFT: Add Notice Form (4 cols) -->
            <div class="lg:col-span-4 space-y-6">
                <div
                    class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-white/50 backdrop-blur-sm relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#0F3D3E] to-[#C6A75E]"></div>

                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-[#0F3D3E]">
                        <svg class="w-5 h-5 text-[#C6A75E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                            </path>
                        </svg>
                        Post New Notice
                    </h2>

                    <form id="notice-form" class="space-y-5">

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Notice
                                Title</label>
                            <input type="text" id="notice-title"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-[#0F3D3E] focus:ring-1 focus:ring-[#0F3D3E] transition-all font-medium placeholder:text-gray-400"
                                placeholder="e.g. Holiday Announcement" required>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Notice
                                Description / Content</label>
                            <textarea id="notice-text" rows="4"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-[#0F3D3E] focus:ring-1 focus:ring-[#0F3D3E] transition-all font-medium placeholder:text-gray-400 resize-none"
                                placeholder="e.g. School will remain closed tomorrow due to heavy rain..."
                                required></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Notice
                                Type</label>
                            <div class="relative">
                                <select id="notice-type"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-[#0F3D3E] focus:ring-1 focus:ring-[#0F3D3E] transition-all font-medium appearance-none cursor-pointer">
                                    <option value="general">🟢 General Info</option>
                                    <option value="urgent">🔴 Urgent / Alert</option>
                                    <option value="event">🟡 Event / Activity</option>
                                    <option value="academic">🔵 Academic (Exams, etc)</option>
                                </select>
                                <div
                                    class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="add-notice-btn"
                            class="w-full mt-2 bg-gradient-to-r from-[#0F3D3E] to-[#145354] hover:from-[#0B2B2C] hover:to-[#0F3D3E] text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2 relative overflow-hidden">
                            <span
                                class="absolute inset-0 w-full h-full bg-white/20 -translate-x-full hover:animate-[shimmer_1s_infinite]"></span>
                            <span class="relative z-10 flex items-center gap-2">
                                Post Notice
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4"></path>
                                </svg>
                            </span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- RIGHT: Notice List (8 cols) -->
            <div class="lg:col-span-8">
                <div
                    class="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white h-[600px] flex flex-col relative overflow-hidden transition-all hover:bg-white">
                    <div class="flex justify-between items-center mb-6 pl-2">
                        <h3 class="font-bold text-xl text-[#0F3D3E] flex items-center gap-2">
                            Active & Recent Notices
                        </h3>
                        <div
                            class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 border border-blue-100">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                                </path>
                            </svg>
                            Live Sync
                        </div>
                    </div>

                    <div id="notices-list" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-10">
                        <!-- Loading State -->
                        <div class="animate-pulse space-y-4">
                            <div class="h-24 bg-gray-100/80 rounded-2xl border border-gray-50"></div>
                            <div class="h-24 bg-gray-100/80 rounded-2xl border border-gray-50"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { db, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, orderBy, onSnapshot } from "../js/firebase-config.js";

        // DOM Elements
        const noticeForm = document.getElementById('notice-form');
        const noticeTitleInput = document.getElementById('notice-title');
        const noticeTextInput = document.getElementById('notice-text');
        const noticeTypeInput = document.getElementById('notice-type');
        const submitBtn = document.getElementById('add-notice-btn');
        const noticesList = document.getElementById('notices-list');

        // Toast Notification System
        window.showToast = function (message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const isSuccess = type === 'success';
            const bgColor = isSuccess ? 'bg-white' : 'bg-red-50';
            const borderColor = isSuccess ? 'border-[#C6A75E]/50' : 'border-red-200';
            const iconColor = isSuccess ? 'text-green-500' : 'text-red-500';
            const textColor = isSuccess ? 'text-[#0F3D3E]' : 'text-red-800';

            const iconSvg = isSuccess
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />`
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />`;

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl border ${borderColor} ${bgColor} transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `
                <svg class="w-6 h-6 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconSvg}</svg>
                <span class="font-bold text-sm ${textColor}">${message}</span>
            `;

            container.appendChild(toast);

            // Animate In
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Animate Out & Remove
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- Post Notice ---
        noticeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalBtnHtml = submitBtn.innerHTML;

            try {
                const title = noticeTitleInput.value.trim();
                const text = noticeTextInput.value.trim();
                const type = noticeTypeInput.value;

                if (!title || !text) {
                    showToast("Notice title and content cannot be empty", "error");
                    return;
                }

                submitBtn.innerHTML = `<span class="relative z-10 flex items-center gap-2"><svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Posting...</span>`;
                submitBtn.disabled = true;

                // Add to Firestore
                await addDoc(collection(db, "notices"), {
                    title: title,
                    text: text,
                    type: type,
                    isActive: true, // Default to visible
                    timestamp: new Date()
                });

                showToast("Notice posted successfully!");
                noticeForm.reset();

            } catch (error) {
                console.error("Error posting notice:", error);
                showToast("Error posting notice. Please try again.", "error");
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
            }
        });

        // --- Fetch & Realtime Listen ---
        function renderNotices(snapshot) {
            noticesList.innerHTML = "";

            if (snapshot.empty) {
                noticesList.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-center py-10 opacity-50 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <svg class="w-10 h-10 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p class="text-sm text-gray-400 font-medium">No notices published yet.</p>
                    </div>`;
                return;
            }

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const id = docSnap.id;

                // Formatting timestamp
                let timeStr = "Just now";
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    timeStr = new Intl.DateTimeFormat('en-US', { day: '2-digit', month: 'short', hour: 'numeric', minute: '2-digit' }).format(date);
                }

                // Decor styling based on type
                let typeColor = "bg-gray-100 text-gray-600";
                let typeIcon = "🟢";
                let typeLabel = "General Info";

                if (data.type === 'urgent') { typeColor = "bg-red-50 text-red-600 border-red-100"; typeIcon = "🔴"; typeLabel = "Urgent"; }
                if (data.type === 'event') { typeColor = "bg-yellow-50 text-yellow-700 border-yellow-200"; typeIcon = "🟡"; typeLabel = "Event"; }
                if (data.type === 'academic') { typeColor = "bg-blue-50 text-blue-600 border-blue-100"; typeIcon = "🔵"; typeLabel = "Academic"; }

                const isActive = data.isActive !== false; // handle legacy docs

                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border transition-all ${isActive ? 'bg-white border-gray-100 shadow-sm hover:shadow-md' : 'bg-gray-50 border-gray-200 opacity-60'}`;

                item.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-2 flex-wrap">
                                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 ${typeColor} text-[10px] uppercase font-bold tracking-wider rounded-md border border-transparent">
                                    ${typeIcon} ${typeLabel}
                                </span>
                                <span class="text-xs text-gray-400 font-medium flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${timeStr}
                                </span>
                            </div>
                            <h4 class="text-[16px] font-bold text-[#0F3D3E] mb-1 ${!isActive ? 'line-through text-gray-500' : ''}">${data.title || 'Untitled Notice'}</h4>
                            <p class="text-[14px] text-[#0F3D3E]/80 font-medium leading-relaxed whitespace-pre-wrap ${!isActive ? 'line-through text-gray-500' : ''}">${data.text}</p>
                        </div>
                        
                        <div class="flex flex-col items-end gap-3 shrink-0 ml-2">
                            <!-- Toggle Active Switch -->
                            <div class="flex items-center flex-col gap-1">
                                <label class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">${isActive ? 'Visible' : 'Hidden'}</label>
                                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" name="toggle" id="toggle-${id}" onchange="toggleNotice('${id}', this.checked)" ${isActive ? 'checked' : ''} class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10"/>
                                    <label for="toggle-${id}" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                                </div>
                            </div>

                            <button onclick="deleteNotice('${id}')" class="text-xs text-red-400 hover:text-red-600 font-bold flex items-center gap-1 mt-1 bg-red-50 hover:bg-red-100 px-2.5 py-1.5 rounded-lg transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Delete
                            </button>
                        </div>
                    </div>
                `;
                noticesList.appendChild(item);
            });
        }

        // Setup Realtime Listener
        if (db) {
            const noticesQuery = query(collection(db, "notices"), orderBy("timestamp", "desc"));
            onSnapshot(noticesQuery, (snapshot) => {
                renderNotices(snapshot);
            }, (error) => {
                console.error("Error listening to notices:", error);
                noticesList.innerHTML = `<p class="text-red-400 text-sm text-center py-4 bg-red-50 rounded-xl">Error fetching data. Ensure Firestore permissions are correct.</p>`;
            });
        }

        // --- Global Functions ---
        window.deleteNotice = async (id) => {
            if (!confirm("Are you sure you want to permanently delete this notice?")) return;
            try {
                await deleteDoc(doc(db, "notices", id));
                showToast("Notice deleted completely.", "success");
            } catch (e) {
                console.error(e);
                showToast("Error deleting notice.", "error");
            }
        };

        window.toggleNotice = async (id, isActive) => {
            try {
                await updateDoc(doc(db, "notices", id), {
                    isActive: isActive
                });
                showToast(isActive ? "Notice is now Visible!" : "Notice is now Hidden.", "success");
            } catch (e) {
                console.error(e);
                showToast("Error updating visibility.", "error");
            }
        };

        window.logout = function () {
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        };
    </script>
</body>

</html>
